# H2 in-memory DB for tests — overrides production application.properties values
spring.datasource.url=jdbc:h2:mem:ecom_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Dummy mail/Cloudinary props so beans construct cleanly — JavaMailSender is mocked in tests that send mail
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.local
spring.mail.password=test
cloudinary.cloud-name=test-cloud
cloudinary.api-key=000000000000000
cloudinary.api-secret=test-secret

# Quieter logs during tests
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.level.root=WARN
