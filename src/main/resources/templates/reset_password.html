<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Reset Password — 7-Eleven Testing Round</title>
    <style>body { background: var(--ec-gray-50); }</style>
</head>

<body>
<section>

    <div class="auth-page py-5">
        <div class="auth-card" style="max-width:500px;">
            <div class="row g-0">
                <div class="col-12">
                    <div class="card-header pb-0">
                        <h4 class="fw-bold mb-0 pt-3">
                            <i class="fa-solid fa-key me-2" style="color:var(--ec-primary);"></i>New Password
                        </h4>
                        <p class="text-muted small mt-1 mb-0">Enter your new password to reset your account access</p>
                    </div>

                    <div class="card-body">
                        <th:block th:if="${session.succMsg}">
                            <div class="alert alert-ecomm alert-success mb-3">
                                <i class="fa-solid fa-circle-check fa-lg"></i>
                                [[${session.succMsg}]]
                            </div>
                        </th:block>
                        <th:block th:if="${session.errorMsg}">
                            <div class="alert alert-ecomm alert-danger mb-3">
                                <i class="fa-solid fa-circle-exclamation fa-lg"></i>
                                [[${session.errorMsg}]]
                            </div>
                        </th:block>

                        <form action="/reset-password" method="post">

                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <div class="password-wrapper">
                                    <input class="form-control" name="password" type="password" id="reset-pwd"
                                           placeholder="Min. 6 characters" style="padding-right:2.5rem;" required>
                                    <button type="button" class="toggle-pwd" onclick="togglePwd('reset-pwd', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <div class="password-wrapper">
                                    <input class="form-control" name="confirmPassword" type="password" id="reset-conf"
                                           placeholder="Repeat password" style="padding-right:2.5rem;" required>
                                    <button type="button" class="toggle-pwd" onclick="togglePwd('reset-conf', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <input type="hidden" th:value="${token}" name="token">

                            <button type="submit" class="btn-ecomm w-100 py-2">
                                <i class="fa-solid fa-check me-2"></i>Update Password
                            </button>
                        </form>
                    </div>

                    <div class="card-footer text-center py-3" style="background:var(--ec-gray-50);">
                        <a href="/signin" class="small text-muted text-decoration-none">
                            <i class="fa-solid fa-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePwd(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }
    </script>
</section>
</body>

</html>
