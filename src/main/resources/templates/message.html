<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Password Changed — 7-Eleven Testing Round</title>
    <style>body { background: var(--ec-gray-50); }</style>
</head>

<body>
<section>

    <div class="auth-page py-5">
        <div class="auth-card" style="max-width:500px;">
            <div class="row g-0">
                <div class="col-12">

                    <div class="text-center pt-5 pb-3">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                             style="width:80px; height:80px; background:var(--ec-success-light);">
                            <i class="fa-solid fa-check-circle fa-3x" style="color:var(--ec-success);"></i>
                        </div>
                        <h3 class="fw-bold">Password Updated!</h3>
                        <p class="text-muted px-4">
                            Your password has been successfully changed. You can now sign in with your new password.
                        </p>
                    </div>

                    <div class="card-body text-center pb-5 px-4">
                        <a href="/signin" class="btn-ecomm w-100 py-2">
                            <i class="fa-solid fa-right-to-bracket me-2"></i>Go to Login
                        </a>
                        <div class="mt-3">
                            <a href="/" class="btn btn-outline-secondary w-100">
                                <i class="fa-solid fa-house me-2"></i>Back to Home
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>
</body>

</html>
