<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password — 7-Eleven Testing Round</title>
    <style>body { background: var(--ec-gray-50); }</style>
</head>

<body>
<section>

    <div class="auth-page py-5">
        <div class="auth-card" style="max-width:500px;">
            <div class="row g-0">
                <div class="col-12">

                    <div class="card-header pb-0 text-center">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                             style="width:64px; height:64px; background:var(--ec-primary-light);">
                            <i class="fa-solid fa-key fa-2x" style="color:var(--ec-primary);"></i>
                        </div>
                        <h4 class="fw-bold mb-1">Forgot Your Password?</h4>
                        <p class="text-muted small mb-0">Enter your email and we'll send you a reset link</p>
                    </div>

                    <div class="card-body">

                        <th:block th:if="${session.succMsg}">
                            <div class="alert alert-ecomm alert-success mb-3">
                                <i class="fa-solid fa-circle-check fa-lg"></i>
                                [[${session.succMsg}]]
                            </div>
                        </th:block>
                        <th:block th:if="${session.errorMsg}">
                            <div class="alert alert-ecomm alert-danger mb-3">
                                <i class="fa-solid fa-circle-exclamation fa-lg"></i>
                                [[${session.errorMsg}]]
                            </div>
                        </th:block>

                        <form action="/forgot-password" method="post">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="border-radius:8px 0 0 8px; border-color:var(--ec-gray-300);">
                                        <i class="fa-solid fa-envelope text-muted"></i>
                                    </span>
                                    <input class="form-control" name="email" type="email"
                                           placeholder="your@email.com"
                                           style="border-radius:0 8px 8px 0;"
                                           required>
                                </div>
                            </div>

                            <button type="submit" class="btn-ecomm w-100 py-2">
                                <i class="fa-solid fa-paper-plane me-2"></i>Send Reset Link
                            </button>
                        </form>
                    </div>

                    <div class="card-footer text-center py-3" style="background:var(--ec-gray-50);">
                        <a href="/signin" class="small text-muted text-decoration-none">
                            <i class="fa-solid fa-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>

</html>
