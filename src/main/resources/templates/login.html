<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Login — 7-Eleven Testing Round</title>
    <style>body { background: var(--ec-gray-50); }</style>
</head>

<body>
<section>

    <!-- Messages -->
    <div class="container pt-4">
        <th:block th:if="${param.error}">
            <div class="alert alert-ecomm alert-danger mx-auto" style="max-width:600px;">
                <i class="fa-solid fa-circle-exclamation fa-lg"></i>
                [[${session.SPRING_SECURITY_LAST_EXCEPTION.message}]]
            </div>
        </th:block>
        <th:block th:if="${param.logout}">
            <div class="alert alert-ecomm alert-success mx-auto" style="max-width:600px;">
                <i class="fa-solid fa-circle-check fa-lg"></i>
                Logged out successfully.
            </div>
        </th:block>
        <th:block th:if="${session.succMsg}">
            <div class="alert alert-ecomm alert-success mx-auto" style="max-width:600px;">
                <i class="fa-solid fa-circle-check fa-lg"></i>
                [[${session.succMsg}]]
            </div>
        </th:block>
    </div>

    <div class="auth-page py-5">
        <div class="auth-card">
            <div class="row g-0">

                <!-- Sidebar visual -->
                <div class="col-lg-5 auth-image d-none d-lg-flex">
                    <div class="text-center text-white">
                        <i class="fa-solid fa-bag-shopping fa-4x mb-3 opacity-75"></i>
                        <h3 class="fw-bold">Welcome Back</h3>
                        <p class="opacity-75 mb-0">Sign in to access the test environment</p>
                    </div>
                </div>

                <!-- Form -->
                <div class="col-lg-7">
                    <div class="card-header pb-0">
                        <h4 class="fw-bold mb-0 pt-3">
                            <i class="fa-solid fa-right-to-bracket me-2" style="color:var(--ec-primary);"></i>Sign In
                        </h4>
                        <p class="text-muted small mt-1 mb-0">Enter your credentials to access your account</p>
                    </div>

                    <div class="card-body">
                        <form action="/login" method="post">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="border-radius:8px 0 0 8px; border-color:var(--ec-gray-300);">
                                        <i class="fa-solid fa-envelope text-muted"></i>
                                    </span>
                                    <input class="form-control" name="username" type="email"
                                           placeholder="your@email.com"
                                           style="border-radius:0 8px 8px 0;"
                                           required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="password-wrapper">
                                    <input class="form-control" name="password" type="password"
                                           id="login-pwd"
                                           placeholder="Enter your password"
                                           style="padding-right:2.5rem;"
                                           required>
                                    <button type="button" class="toggle-pwd" onclick="togglePwd('login-pwd', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember" style="accent-color:var(--ec-primary);">
                                    <label class="form-check-label small text-muted" for="remember">Remember me</label>
                                </div>
                                <a href="/forgot-password" class="small fw-semibold" style="color:var(--ec-primary);">
                                    Forgot password?
                                </a>
                            </div>

                            <button type="submit" class="btn-ecomm w-100 py-2">
                                <i class="fa-solid fa-arrow-right me-2"></i>Sign In
                            </button>
                        </form>
                    </div>

                    <div class="card-footer text-center py-3" style="background:var(--ec-gray-50); border-top:1px solid var(--ec-gray-100);">
                        <p class="mb-0 small text-muted">
                            Don't have an account?
                            <a href="/register" class="fw-bold text-decoration-none" style="color:var(--ec-primary);">
                                Register here <i class="fa-solid fa-arrow-right ms-1"></i>
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePwd(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</section>
</body>

</html>
