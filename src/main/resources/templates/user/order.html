<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Checkout — 7-Eleven Testing Round</title>
</head>

<body>
<section>

    <div class="container py-4">
        <h2 class="fw-bold mb-4">
            <i class="fa-solid fa-credit-card me-2" style="color:var(--ec-primary);"></i>Checkout
        </h2>

        <div class="row g-4">

            <!-- Billing Form -->
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header">
                        <h5 class="fw-bold mb-0">
                            <i class="fa-solid fa-location-dot me-2" style="color:var(--ec-primary);"></i>Shipping Address
                        </h5>
                    </div>
                    <div class="card-body">
                        <form action="/user/save-order" method="post">

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">First Name *</label>
                                    <input type="text" name="firstName" class="form-control" placeholder="John" required>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Last Name *</label>
                                    <input type="text" name="lastName" class="form-control" placeholder="Doe" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">Email *</label>
                                    <input type="email" name="email" class="form-control" placeholder="john@email.com" required>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Phone *</label>
                                    <input type="text" name="mobile" class="form-control" placeholder="+1 234 5678" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">Address *</label>
                                    <input type="text" name="address" class="form-control" placeholder="123 Main St" required>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">City *</label>
                                    <input type="text" name="city" class="form-control" placeholder="New York" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">State *</label>
                                    <input type="text" name="state" class="form-control" placeholder="NY" required>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Zip Code *</label>
                                    <input type="number" name="pincode" class="form-control" placeholder="10001" required>
                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-top">
                                <label class="form-label">
                                    <i class="fa-solid fa-wallet me-1" style="color:var(--ec-primary);"></i>Payment Method
                                </label>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <div class="form-check card p-3" style="border:2px solid var(--ec-gray-200); border-radius:var(--ec-radius); cursor:pointer;">
                                            <input class="form-check-input" type="radio" name="paymentType" value="COD" id="cod" checked style="accent-color:var(--ec-primary);">
                                            <label class="form-check-label d-flex align-items-center gap-2 w-100" for="cod">
                                                <i class="fa-solid fa-money-bill-wave fa-lg" style="color:var(--ec-success);"></i>
                                                <div>
                                                    <div class="fw-semibold small">Cash on Delivery</div>
                                                    <div class="text-muted" style="font-size:.7rem;">Pay when you receive</div>
                                                </div>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="form-check card p-3" style="border:2px solid var(--ec-gray-200); border-radius:var(--ec-radius); cursor:pointer;">
                                            <input class="form-check-input" type="radio" name="paymentType" value="ONLINE" id="online" style="accent-color:var(--ec-primary);">
                                            <label class="form-check-label d-flex align-items-center gap-2 w-100" for="online">
                                                <i class="fa-solid fa-credit-card fa-lg" style="color:var(--ec-blue);"></i>
                                                <div>
                                                    <div class="fw-semibold small">Online Payment</div>
                                                    <div class="text-muted" style="font-size:.7rem;">Card / PayPal</div>
                                                </div>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn-ecomm w-100 mt-4 py-2">
                                <i class="fa-solid fa-bag-shopping me-2"></i>Place Order
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-5">
                <div class="card sticky-top" style="top:1rem;">
                    <div class="card-header">
                        <h5 class="fw-bold mb-0">
                            <i class="fa-solid fa-receipt me-2" style="color:var(--ec-primary);"></i>Order Summary
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="order-summary">
                            <div class="summary-row">
                                <span class="text-muted">Subtotal</span>
                                <span class="fw-semibold">$[[${orderPrice}]]</span>
                            </div>
                            <div class="summary-row">
                                <span class="text-muted">Shipping</span>
                                <span class="text-success fw-semibold">Free</span>
                            </div>
                            <div class="summary-row">
                                <span class="text-muted">Tax</span>
                                <span class="fw-semibold">$10</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total</span>
                                <span style="color:var(--ec-primary);">$[[${totalOrderPrice}]]</span>
                            </div>
                        </div>

                        <div class="mt-3 p-3 rounded" style="background:var(--ec-gray-50);">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <i class="fa-solid fa-shield-check fa-lg" style="color:var(--ec-success);"></i>
                                <span class="small fw-semibold">100% Secure Purchase</span>
                            </div>
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <i class="fa-solid fa-rotate-left fa-lg" style="color:var(--ec-blue);"></i>
                                <span class="small fw-semibold">7-Day Return</span>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <i class="fa-solid fa-headset fa-lg" style="color:var(--ec-warning);"></i>
                                <span class="small fw-semibold">24/7 Support</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
</body>
</html>
