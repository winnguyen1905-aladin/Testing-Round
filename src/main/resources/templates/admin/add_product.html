<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Add Product — Admin</title>
</head>

<body>
<section>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card card-ecomm">
                    <div class="card-header">
                        <h4 class="fw-bold mb-0">
                            <i class="fa-solid fa-plus me-2" style="color:var(--ec-primary);"></i>Add Product
                        </h4>
                    </div>
                    <div class="card-body">

                        <th:block th:if="${session.succMsg}">
                            <div class="alert alert-ecomm alert-success mb-3">
                                <i class="fa-solid fa-circle-check fa-lg"></i>
                                [[${session.succMsg}]]
                            </div>
                        </th:block>
                        <th:block th:if="${session.errorMsg}">
                            <div class="alert alert-ecomm alert-danger mb-3">
                                <i class="fa-solid fa-circle-exclamation fa-lg"></i>
                                [[${session.errorMsg}]]
                            </div>
                        </th:block>

                        <form th:action="@{/admin/saveProduct}" th:object="${product}" method="post" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label">Title *</label>
                                <input type="text" class="form-control" th:field="*{title}" placeholder="Product name" required>
                                <div th:if="${#fields.hasErrors('title')}" class="text-danger small mt-1">
                                    <small th:errors="*{title}"></small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Description *</label>
                                <textarea rows="3" class="form-control" th:field="*{description}"
                                          placeholder="Describe your product..." required></textarea>
                                <div th:if="${#fields.hasErrors('description')}" class="text-danger small mt-1">
                                    <small th:errors="*{description}"></small>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">Category *</label>
                                    <select class="form-control" th:field="*{category}" required>
                                        <option value="">-- Select --</option>
                                        <option th:each="c : ${categories}" th:value="${c.name}" th:text="${c.name}"></option>
                                    </select>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Price ($) *</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="0.00" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">Discount (%)</label>
                                    <input type="number" class="form-control" th:field="*{discount}" placeholder="0">
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Stock *</label>
                                    <input type="number" class="form-control" th:field="*{stock}" min="0" placeholder="Quantity" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{isActive}" id="activeT" value="true" checked style="accent-color:var(--ec-primary);">
                                    <label class="form-check-label" for="activeT">Active</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{isActive}" id="activeF" value="false" style="accent-color:var(--ec-primary);">
                                    <label class="form-check-label" for="activeF">Inactive</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Product Image</label>
                                <input type="file" name="file" class="form-control" accept="image/*">
                                <div class="form-text">Formats: JPG, PNG, WEBP. Max 5MB.</div>
                            </div>

                            <button type="submit" class="btn-ecomm w-100">
                                <i class="fa-solid fa-plus me-1"></i>Save Product
                            </button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
