<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Users — Admin</title>
</head>

<body>
<section>
    <div class="container py-4">
        <h2 class="fw-bold mb-4">
            <i class="fa-solid fa-users me-2" style="color:var(--ec-primary);"></i>Users
        </h2>

        <th:block th:if="${session.succMsg}">
            <div class="alert alert-ecomm alert-success mb-3">
                <i class="fa-solid fa-circle-check fa-lg"></i>
                [[${session.succMsg}]]
                <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
            </div>
        </th:block>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-modern mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Photo</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u, c : ${users}">
                                <td data-label="#">[[${c.count}]]</td>
                                <td data-label="Photo">
                                    <img th:if="${u.profileImage != null and !u.profileImage.isEmpty()}"
                                         th:src="${u.profileImage}"
                                         alt="${u.name}"
                                         width="48" height="48"
                                         class="rounded-circle object-fit-cover"
                                         onerror="this.src='/images/default-profile.png'">
                                    <img th:unless="${u.profileImage != null and !u.profileImage.isEmpty()}"
                                         src="/images/default-profile.png"
                                         alt="${u.name}"
                                         width="48" height="48"
                                         class="rounded-circle object-fit-cover">
                                </td>
                                <td data-label="Name" class="fw-semibold">[[${u.name}]]</td>
                                <td data-label="Email">[[${u.email}]]</td>
                                <td data-label="Phone">[[${u.mobileNumber}]]</td>
                                <td data-label="Address" class="small">
                                    [[${u.address}]]<br>
                                    [[${u.city}]], [[${u.state}]] [[${u.pinCode}]]
                                </td>
                                <td data-label="Status">
                                    <th:block th:if="${u.isEnabled}">
                                        <span class="badge badge-success">
                                            <i class="fa-solid fa-check-circle me-1"></i>Active
                                        </span>
                                    </th:block>
                                    <th:block th:unless="${u.isEnabled}">
                                        <span class="badge badge-danger">
                                            <i class="fa-solid fa-ban me-1"></i>Inactive
                                        </span>
                                    </th:block>
                                </td>
                                <td data-label="Actions">
                                    <th:block th:if="${!u.isEnabled}">
                                        <a th:href="@{'/admin/updateStatus?status=true&id=' + ${u.id}}"
                                           class="btn btn-sm btn-outline-success rounded-pill px-3">
                                            <i class="fa-solid fa-check me-1"></i>Activate
                                        </a>
                                    </th:block>
                                    <th:block th:if="${u.isEnabled}">
                                        <a th:href="@{'/admin/updateStatus?status=false&id=' + ${u.id}}"
                                           class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                           onclick="return confirm('Deactivate this user?')">
                                            <i class="fa-solid fa-ban me-1"></i>Deactivate
                                        </a>
                                    </th:block>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
