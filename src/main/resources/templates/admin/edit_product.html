<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Edit Product — Admin</title>
</head>

<body>
<section>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card card-ecomm">
                    <div class="card-header">
                        <h4 class="fw-bold mb-0">
                            <i class="fa-solid fa-pen-to-square me-2" style="color:var(--ec-primary);"></i>Edit Product
                        </h4>
                    </div>
                    <div class="card-body">

                        <th:block th:if="${session.succMsg}">
                            <div class="alert alert-ecomm alert-success mb-3">
                                <i class="fa-solid fa-circle-check fa-lg"></i>
                                [[${session.succMsg}]]
                            </div>
                        </th:block>
                        <th:block th:if="${session.errorMsg}">
                            <div class="alert alert-ecomm alert-danger mb-3">
                                <i class="fa-solid fa-circle-exclamation fa-lg"></i>
                                [[${session.errorMsg}]]
                            </div>
                        </th:block>

                        <form action="/admin/updateProduct" method="post" enctype="multipart/form-data">
                            <input type="hidden" name="id" th:value="${product.id}">

                            <div class="mb-3">
                                <label class="form-label">Title</label>
                                <input type="text" name="title" th:value="${product.title}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea rows="3" name="description" class="form-control">[[${product.description}]]</textarea>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">Category</label>
                                    <select class="form-control" name="category">
                                        <option>[[${product.category}]]</option>
                                        <option th:each="c : ${categories}">[[${c.name}]]</option>
                                    </select>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" step="0.01" name="price" th:value="${product.price}" class="form-control">
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">Discount (%)</label>
                                    <input type="number" name="discount" th:value="${product.discount}" class="form-control">
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Final Price</label>
                                    <input type="number" step="0.01" th:value="${product.discountPrice}" class="form-control" readonly
                                           style="background:var(--ec-gray-50);">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="isActive" value="true"
                                           id="activeY" th:checked="${product.isActive == true}" style="accent-color:var(--ec-primary);">
                                    <label class="form-check-label" for="activeY">Active</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="isActive" value="false"
                                           id="activeN" th:checked="${product.isActive == false}" style="accent-color:var(--ec-primary);">
                                    <label class="form-check-label" for="activeN">Inactive</label>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">Stock</label>
                                    <input type="number" name="stock" th:value="${product.stock}" class="form-control">
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">New Image</label>
                                    <input type="file" name="file" class="form-control" accept="image/*">
                                </div>
                            </div>

                            <div class="text-center mb-3">
                                <img th:if="${product.image != null and !product.image.isEmpty()}"
                                     th:src="${product.image}"
                                     width="100" height="100"
                                     class="rounded object-fit-cover"
                                     onerror="this.src='/img/default-product.png'">
                                <img th:unless="${product.image != null and !product.image.isEmpty()}"
                                     src="/img/default-product.png"
                                     width="100" height="100"
                                     class="rounded object-fit-cover">
                            </div>

                            <button type="submit" class="btn-ecomm w-100">
                                <i class="fa-solid fa-check me-1"></i>Update
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
