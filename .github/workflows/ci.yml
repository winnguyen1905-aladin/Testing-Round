name: CI

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub Container Registry. Image owner is the repo owner (lowercased
  # by GitHub on the registry side). Pulled with:
  #   docker pull ghcr.io/<owner>/ecommerce-with-spring:latest
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ecommerce-with-spring
  JAVA_VERSION: '17'

jobs:
  # ============================================================
  # Test — runs on every push and PR.
  # `mvn test` uses the default surefire config which excludes the `e2e`
  # tag, so headed-browser tests are skipped here. To run headless browser
  # tests too: install Playwright deps and switch to `-Pall-tests`.
  # ============================================================
  test:
    name: Unit + Web + Integration tests
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

      - name: Upload surefire reports
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ============================================================
  # Build & push image to GitHub Container Registry (ghcr.io) — only
  # on push to main or tag (PRs from forks can't write packages).
  # Auth uses the built-in GITHUB_TOKEN; no external secrets needed.
  # ============================================================
  build-push:
    name: Build & push image to GHCR
    needs: test
    if: github.event_name == 'push'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    outputs:
      tags:    ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
      digest:  ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # Tags applied per push:
          #   - branch-${branch}     on branch pushes
          #   - sha-${short_sha}     immutable per commit
          #   - the git tag (v1.2.3) on tag pushes
          #   - `latest`             only on the default branch
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
