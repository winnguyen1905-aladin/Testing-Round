name: CI

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub repo. Override DOCKERHUB_USERNAME via a repo secret if it
  # ever needs to point at a different account.
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME || 'victor1905' }}/ecommerce-with-spring
  JAVA_VERSION: '17'

jobs:
  # ============================================================
  # Test — runs on every push and PR.
  # `mvn test` uses the default surefire config which excludes the `e2e`
  # tag, so headed-browser tests are skipped here. To run headless browser
  # tests too: install Playwright deps and switch to `-Pall-tests`.
  # ============================================================
  test:
    name: Unit + Web + Integration tests
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload JaCoCo coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  # ============================================================
  # Build & push image to Docker Hub — only on push to main or tag
  # (not PRs, since PR runs from forks can't auth to Docker Hub).
  #
  # Requires repo secrets:
  #   DOCKERHUB_USERNAME   — e.g. victor1905
  #   DOCKERHUB_TOKEN      — Docker Hub access token with Read & Write scope
  #                          (https://hub.docker.com/settings/security)
  # ============================================================
  build-push:
    name: Build & push image to Docker Hub
    needs: test
    if: github.event_name == 'push'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: read

    outputs:
      tags:    ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
      digest:  ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # Tags applied per push:
          #   - branch-${branch}     on branch pushes
          #   - sha-${short_sha}     immutable per commit
          #   - the git tag (v1.2.3) on tag pushes
          #   - `latest`             only on the default branch
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
